<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Danimeverse</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <nav class="flex justify-between items-center p-6">
    <h1 class="text-3xl font-bold text-purple-500">
      Danimeverse
    </h1>

    <ul class="flex gap-6">
      <li>Home</li>
      <li>Trending</li>
      <li>Genres</li>
    </ul>
  </nav>

  <section class="relative h-screen flex items-center px-10">

    <img
      src="https://wallpapercave.com/wp/wp5128415.jpg"
      class="absolute inset-0 w-full h-full object-cover opacity-40"
    />

    <div class="relative z-10 max-w-2xl">
      <h1 class="text-6xl font-bold mb-6">
        Attack on Titan
      </h1>

      <p class="text-lg text-gray-300 mb-6">
        Humanity fights for survival against terrifying Titans beyond the walls.
      </p>

      <button class="bg-purple-600 px-6 py-3 rounded-lg hover:bg-purple-700">
        Watch Now
      </button>
    </div>

  </section>

</body>
</html>
